<!DOCTYPE html>
<html>
<head>
  <title>Print Receipt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>(function(){try{if(localStorage.getItem('ssm_dark')==='1')document.documentElement.classList.add('dark');}catch(e){}})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6d28d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sone Sone Mommy">
  <link rel="apple-touch-icon" href="icon-180.png">
  <script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("service-worker.js").catch(function(){});});}</script>
  <script src="receipt.js"></script>
  <style>
    :root{
      --bg:#f4f5f8; --surface:#ffffff; --line:#eaecf1; --line-2:#dcdfe7;
      --ink:#15171c; --ink-3:#8b919e; --brand:#6d28d9;
      --shadow:0 1px 2px rgba(16,24,40,.04), 0 6px 18px rgba(16,24,40,.06);
    }
    html.dark{ --bg:#0f1116; --surface:#181b22; --ink:#e8eaef; --ink-3:#727a87;
      --line:#252a33; --line-2:#333a46; --brand:#8b5cf6; }
    *{ box-sizing:border-box; }
    body{ font-family:system-ui,'Noto Sans Myanmar','Padauk','Myanmar Text','Segoe UI',sans-serif;
      background:var(--bg); color:var(--ink); margin:0; padding:16px; -webkit-text-size-adjust:100%; }

    .btn-bar{ display:flex; gap:9px; justify-content:center; max-width:340px; margin:0 auto 16px; }
    .btn-bar button{ flex:1; font-family:inherit; font-size:15px; font-weight:600; color:#fff;
      background:var(--brand); border:none; padding:13px 18px; border-radius:12px; cursor:pointer; }
    .btn-bar button.back{ background:var(--surface); color:var(--ink); border:1px solid var(--line-2); }

    /* Receipt stays black/white — thermal printers are monochrome */
    #receipt {
      width: 72mm; max-width: 100%; margin: 0 auto; background: white;
      padding: 4mm; box-sizing: border-box;
      font-family: 'Courier New', monospace; font-size: 11px;
      line-height: 1.3; color: #000;
      border:1px solid var(--line-2); border-radius:12px; box-shadow:var(--shadow);
    }
    #receipt .center { text-align: center; }
    #receipt hr { border: none; border-top: 1px dashed #000; margin: 5px 0; }
    #receipt .line { display: flex; justify-content: space-between; margin: 2px 0; font-family: Arial, sans-serif; }
    .mm { font-family: Arial, sans-serif; }
    .town-mid { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
    .cus-mid  { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
    .phone-clear { font-weight: bold; font-size: 12px; }
    .addr-mm { font-family: Arial, sans-serif; font-size: 10px; }
    .item-name { font-weight: bold; margin-top: 4px; }
    .item-sub { display: flex; justify-content: space-between; font-size: 10px; color: #333; }
    .item-remark { font-size: 10px; color: #000; margin-left: 4px; }
    #receipt .net-box {
      text-align: center; font-size: 13px; font-weight: bold;
      border: 1.5px solid #000; padding: 5px; margin: 5px 0;
    }
    #receipt .delivery-note { text-align:center; font-family:Arial,sans-serif; font-size:11px; margin:4px 0; }
    #receipt .footer-mm {
      font-family: Arial, sans-serif; text-align: center;
      font-size: 11px; margin-top: 6px; line-height: 1.4;
    }

    @media print {
      body { background: white; padding: 0; margin: 0; }
      .btn-bar { display: none; }
      #receipt { width: 80mm; padding: 2mm 2mm 12mm; margin: 0; border:none; border-radius:0; box-shadow:none; }
      @page { size: 80mm auto; margin: 0; }
    }
  </style>
</head>

<body>

  <div class="btn-bar">
    <button onclick="window.print()">🖨️ Print</button>
    <button class="back" onclick="location.href='receipts.html'">← Back</button>
  </div>

  <div id="receipt"></div>

  <script>
    let sale = JSON.parse(localStorage.getItem("printReceipt"));

    if (!sale) {
      document.getElementById("receipt").innerHTML =
        "<p style='color:red;'>Receipt data မတွေ့ပါ။ Receipts စာမျက်နှာမှ Print နှိပ်ပါ။</p>";
      throw new Error("No print data");
    }

    ssmRenderReceipt(document.getElementById("receipt"), sale);
  </script>
</body>
</html>
